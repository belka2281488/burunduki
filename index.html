<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Галерея бурундуков Кирилова</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <h1>🐿️ Галерея бурундуков</h1>
  <p class="subtitle">Все бурундуки Кирилова в одном месте</p>
</header>

<main>
  <div class="pick-wrap">
    <button id="uploadBtn" class="pick-btn">➕ Добавить бурундука</button>
    <div id="status" class="status">Загружаю галерею...</div>
  </div>
  <div id="gallery" class="gallery"></div>
</main>

<input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp,image/gif" style="display:none">

<!-- модалка добавления / редактирования -->
<div id="uploadModal" class="modal">
  <div class="modal-box">
    <h3 id="modalTitle">Новый бурундук 🐿️</h3>
    <div class="modal-preview-wrap">
      <img id="uploadPreview" class="modal-preview" alt="превью">
    </div>
    <label class="modal-label">Имя бурундука</label>
    <input type="text" id="uploadName" class="modal-input" placeholder="например: кирил чеченец">

    <label class="modal-label">Описание (необязательно)</label>
    <textarea id="uploadDescription" class="modal-input modal-textarea" placeholder="например: найден на кухне в 3 часа ночи"></textarea>

    <div class="modal-actions">
      <button id="uploadCancel" class="tool-btn">Отмена</button>
      <button id="uploadConfirm" class="pick-btn small">Добавить в галерею</button>
    </div>
  </div>
</div>

<!-- модалка подтверждения удаления -->
<div id="deleteModal" class="modal">
  <div class="modal-box modal-box-small">
    <h3>Удалить бурундука?</h3>
    <p class="modal-warning">Это действие нельзя отменить.</p>
    <div class="modal-actions">
      <button id="deleteCancel" class="tool-btn">Отмена</button>
      <button id="deleteConfirm" class="pick-btn small danger">Удалить</button>
    </div>
  </div>
</div>

<!-- Лайтбокс для просмотра -->
<div id="lightbox" class="lightbox">
  <button class="lightbox-close" id="lightboxClose">&times;</button>
  <div class="lightbox-name" id="lightboxName"></div>
  <div class="lightbox-description" id="lightboxDescription"></div>

  <div class="lightbox-toolbar">
    <button id="modeLoupeBtn" class="tool-btn active" title="Лупа (наведение)">🔍 Лупа</button>
    <button id="modeZoomBtn" class="tool-btn" title="Приблизить и таскать мышью">🖐️ Зум</button>
    <div class="tool-sep"></div>
    <button id="downloadBtn" class="tool-btn" title="Скачать фото">⬇️ Скачать</button>
    <button id="copyBtn" class="tool-btn" title="Скопировать в буфер обмена">📋 Копировать</button>
    <div class="tool-sep"></div>
    <button id="editBtn" class="tool-btn" title="Редактировать">✏️ Изменить</button>
    <button id="deleteBtn" class="tool-btn tool-btn-danger" title="Удалить">🗑️ Удалить</button>
  </div>

  <div class="lightbox-hint" id="lightboxHint">Наведи курсор на фото, чтобы приблизить · колесо мыши — размер лупы</div>

  <div class="zoom-container" id="zoomContainer">
    <img id="lightboxImg" src="" alt="">
    <div class="magnifier" id="magnifier"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
